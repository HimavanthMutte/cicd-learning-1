name: My First Workflow
on: push
jobs:
    my_first_job:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v7

            - name: Generate ACII Art
              run: |
                ls -lrt
                chmod +x ./generate-ascii.sh
                ./generate-ascii.sh

            - name: Welcome Message along with reademe.md
              run: |
                echo "You Made It!!"
                ls
                cat README.md