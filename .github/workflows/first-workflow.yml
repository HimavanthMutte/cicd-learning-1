name: My First Workflow
on: push
jobs:
    my_first_job:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout
              uses: actions/checkout@v7
            
            - name: Generate ASCII Art
              run: cowsay -f tux "Hello from Linux!"

            - name: Welcome Message along with reademe.md
              run: |
                echo "You Made It!!"
                ls
                cat README.md