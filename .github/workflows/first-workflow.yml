name: My First Workflow
on: push
jobs:
    build_job:
      strategy:
        matrix:
          os: [ubuntu-latets,ubuntu-20.04,windows-latest]
          images: [hello-world,alpine]
      runs-on: ${{ matrix.os }}
      steps:
        - name: Docker Check -- ${{ matrix.os }}
          run: docker info
        - name: Running Image
          run: docker run ${{ matrix.images }}
    
            